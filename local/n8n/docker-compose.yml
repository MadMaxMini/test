services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=127.0.0.1
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://127.0.0.1:5678/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}  # set in .env
      - N8N_USER_MANAGEMENT_DISABLED=false
    volumes:
      - ./data:/home/node/.n8n
      - ${HOME}/Work/madmax/coaches:/coaches  # mount coach mailboxes
    # Note: start this only in Phase 4 when workflows are ready
